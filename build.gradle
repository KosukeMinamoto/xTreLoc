plugins {
    id 'java'
    id 'application'
}

group = 'com.treloc.hypotd'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.commons:commons-math3:3.6.1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.1'
    implementation 'edu.mines.jtk:edu-mines-jtk:1.1.0'
    implementation 'edu.sc.seis:seisFile:2.0.6'
    implementation 'jfree:jfreechart:1.0.13'
    implementation 'edu.sc.seis:TauP:2.6.1'
    implementation 'net.sf.geographiclib:GeographicLib-Java:1.42'
    testImplementation 'junit:junit:4.11'
}

application {
    mainClass = 'com.treloc.hypotd.App'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    sourceCompatibility = '11'
    targetCompatibility = '11'
}

tasks.javadoc {
    options {
        author = true
        encoding = 'UTF-8'
        charSet = 'UTF-8'
        docEncoding = 'UTF-8'
        links("https://docs.oracle.com/en/java/javase/11/docs/api/")
    }
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.treloc.hypotd.App'
        )
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
    }
}